<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guía de Cotización - Seguros Digitales SDI</title>
    
    <!-- Carga Tailwind CSS para los estilos -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Carga React para la interactividad -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Carga Babel para traducir el código en tiempo real -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // --- ICONOS (Reemplazando lucide-react para que funcione sin instalación) ---
        const Icon = ({ path, className, fill = "none" }) => (
            <svg className={className} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" dangerouslySetInnerHTML={{ __html: path }} />
        );
        const ShieldCheck = (p) => <Icon {...p} path='<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/><path d="m9 12 2 2 4-4"/>' />;
        const Car = (p) => <Icon {...p} path='<path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-.6 0-1.1.4-1.4.9l-1.4 2.9A3.7 3.7 0 0 0 2 12v4c0 .6.4 1 1 1h2"/><circle cx="7" cy="17" r="2"/><path d="M9 17h6"/><circle cx="17" cy="17" r="2"/>' />;
        const HeartPulse = (p) => <Icon {...p} path='<path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/><path d="M3.22 12H9.5l.5-1 2 4.5 2-7 1.5 3.5h5.27"/>' />;
        const Wrench = (p) => <Icon {...p} path='<path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>' />;
        const Umbrella = (p) => <Icon {...p} path='<path d="M22 12a10.06 10.06 0 0 0-20 0Z"/><path d="M12 12v8a2 2 0 0 0 4 0"/><path d="M12 2v1"/>' />;
        const HelpCircle = (p) => <Icon {...p} path='<circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><path d="M12 17h.01"/>' />;
        const CheckCircle = (p) => <Icon {...p} path='<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="m9 11 3 3L22 4"/>' />;
        const AlertTriangle = (p) => <Icon {...p} path='<path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/>' />;
        const CreditCard = (p) => <Icon {...p} path='<rect width="20" height="14" x="2" y="5" rx="2"/><path d="M2 10h20"/>' />;
        const Phone = (p) => <Icon {...p} path='<path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>' />;
        const Calendar = (p) => <Icon {...p} path='<rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/>' />;
        const ArrowRight = (p) => <Icon {...p} path='<path d="M5 12h14"/><path d="m12 5 7 7-7 7"/>' />;
        const ChevronDown = (p) => <Icon {...p} path='<path d="m6 9 6 6 6-6"/>' />;
        const ChevronUp = (p) => <Icon {...p} path='<path d="m18 15-6-6-6 6"/>' />;
        const Star = (p) => <Icon {...p} path='<path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>' fill="currentColor" />;

        // --- DATOS DEL COMPONENTE ---
        const Coverages = [
        {
            id: 'A y C',
            title: 'Daños a Terceros (A y C)',
            icon: <Car className="w-8 h-8 text-blue-500" />,
            description: 'Responsabilidad Civil. Si eres el responsable de un accidente, esta cobertura paga los daños ocasionados a otras personas (lesiones) y a sus bienes (otros vehículos, muros, postes).',
            details: 'Incluye la cobertura A (Personas) por hasta ₡300 millones por accidente y la cobertura C (Propiedad) por hasta ₡100 millones.'
        },
        {
            id: 'D y F',
            title: 'Tu Vehículo: Colisión y Robo (D y F)',
            icon: <ShieldCheck className="w-8 h-8 text-green-500" />,
            description: 'Protección directa para tu carro. Cubre los gastos de reparación si chocas, te vuelcas, o la indemnización si te roban el vehículo.',
            details: 'Se asegura por el valor declarado de tu vehículo en el mercado. Aplica un deducible fijo.'
        },
        {
            id: 'B',
            title: 'Gastos Médicos (B)',
            icon: <HeartPulse className="w-8 h-8 text-red-500" />,
            description: 'Servicios Médicos para vos y tus acompañantes. Cubre hospitalización, medicinas y atención médica en caso de un accidente de tránsito.',
            details: 'Monto cubierto: Hasta ₡15,000,000.00'
        },
        {
            id: 'H',
            title: 'Riesgos Adicionales (H)',
            icon: <Umbrella className="w-8 h-8 text-purple-500" />,
            description: 'Protección contra la naturaleza y vandalismo. Cubre daños por inundaciones, temblores, caída de árboles, derrumbes o actos malintencionados de terceros.',
            details: 'Cubre hasta el valor total asegurado de tu vehículo.'
        },
        {
            id: 'G y M',
            title: 'Asistencia en Carretera 24/7 (G y M)',
            icon: <Wrench className="w-8 h-8 text-orange-500" />,
            description: 'Tu salvavidas en la calle. Servicio de grúa, paso de corriente, cerrajero, cambio de llanta y envío de combustible.',
            details: 'Multiasistencia extendida para que nunca te quedes botado, sin importar la hora ni el lugar.'
        }
        ];

        function ExplicadorSeguro() {
        const [activeCoverage, setActiveCoverage] = useState(null);
        const [showAsistencia, setShowAsistencia] = useState(false);
        const [asistenciaTab, setAsistenciaTab] = useState('plus');

        const asistenciasPlus = [
            { serv: 'Remolque por avería / accidente', limite: 'Máximo 7 eventos', monto: '$200 por evento' },
            { serv: 'Cerrajería', limite: 'Máximo 6 eventos', monto: '$150 por evento' },
            { serv: 'Envío de combustible', limite: 'Máximo 6 eventos', monto: 'Costo del combustible' },
            { serv: 'Cambio de llanta / Paso corriente', limite: 'Máximo 6 y 4 eventos', monto: '$125 por evento' },
            { serv: 'Mini-rescate (Atoramiento)', limite: 'Máximo 4 eventos', monto: '$125 por evento' },
            { serv: 'Renta de vehículo sustituto', limite: 'Máximo 4 eventos', monto: '$100 por evento' },
            { serv: 'Taxi al aeropuerto (Ida y regreso)', limite: '2 viajes al año', monto: 'Servicio Incluido', destacado: true },
        ];

        const asistenciasBasico = [
            { serv: 'Remolque por avería', limite: 'Máximo 6 eventos', monto: '$175 por evento' },
            { serv: 'Remolque por accidente', limite: 'Máximo 7 eventos', monto: '$175 por evento' },
            { serv: 'Cerrajería', limite: 'Máximo 4 eventos', monto: '$125 por evento' },
            { serv: 'Envío de combustible', limite: 'Máximo 4 eventos', monto: 'Costo del combustible' },
            { serv: 'Cambio de llanta / Paso corriente', limite: 'Máximo 4 y 3 eventos', monto: '$100 por evento' },
            { serv: 'Mini-rescate (Atoramiento)', limite: 'Máximo 3 eventos', monto: '$100 por evento' },
        ];

        return (
            <div className="min-h-screen bg-gray-50 font-sans text-gray-800">
            {/* Header */}
            <header className="bg-blue-900 text-white p-6 shadow-md">
                <div className="max-w-4xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
                <div className="flex items-center gap-4 md:gap-6 flex-col md:flex-row text-center md:text-left">
                    <img src="./INS BLANCO.png" alt="INS Logo" className="h-14 md:h-16 w-auto object-contain drop-shadow-md" />
                    <div>
                    <h1 className="text-2xl md:text-3xl font-bold">
                        Guía de tu Cotización
                    </h1>
                    <p className="mt-1 text-blue-200 text-sm md:text-base">Entiende tu inversión de forma clara y sencilla</p>
                    </div>
                </div>
                <div className="bg-blue-800 px-4 py-2 rounded-lg border border-blue-700 whitespace-nowrap">
                    <p className="text-sm font-semibold flex items-center justify-center gap-2">
                    <ShieldCheck className="w-5 h-5 text-green-400" />
                    Proceso 100% Digital
                    </p>
                </div>
                </div>
            </header>

            <main className="max-w-4xl mx-auto p-4 md:p-6 space-y-10">
                {/* Intro Section */}
                <section className="bg-white rounded-2xl p-6 md:p-8 shadow-sm border border-gray-100 mt-6">
                <h2 className="text-2xl font-bold text-gray-800 mb-4 flex items-center gap-2">
                    ¡Hola! Analicemos tu propuesta <ArrowRight className="text-blue-500 w-6 h-6" />
                </h2>
                <p className="text-lg text-gray-600 mb-6">
                    Junto a este enlace, recibiste un documento PDF con tu cotización oficial. Sabemos que los seguros pueden tener muchos términos técnicos, por eso creamos esta guía para explicarte <strong>exactamente qué estás comprando</strong> y cómo te protege.
                </p>
                
                <div className="bg-blue-50 border-l-4 border-blue-500 p-4 rounded-r-lg flex items-start gap-4">
                    <Calendar className="w-6 h-6 text-blue-600 flex-shrink-0 mt-1" />
                    <div>
                    <h3 className="font-semibold text-blue-900">Modalidades de Pago Exclusivas</h3>
                    <p className="text-blue-800 mt-1">
                        Para garantizar la mejor tarifa y estabilidad en tu póliza, trabajamos exclusivamente con pagos <strong>Anuales, Semestrales y Trimestrales</strong>. <em>(Recuerda que el pago anual incluye hasta un 10% de descuento).</em>
                    </p>
                    </div>
                </div>
                </section>

                {/* Coverages Section */}
                <section>
                <div className="text-center mb-8">
                    <h2 className="text-3xl font-bold text-gray-800">¿Qué incluye tu "Cobertura Total"?</h2>
                    <p className="text-gray-500 mt-2">Toca cada tarjeta para ver los detalles de las letras en tu cotización (A, B, C, etc.)</p>
                </div>

                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                    {Coverages.map((cov) => (
                    <div 
                        key={cov.id}
                        onClick={() => setActiveCoverage(activeCoverage === cov.id ? null : cov.id)}
                        className={`cursor-pointer transition-all duration-300 rounded-xl border-2 p-5 bg-white shadow-sm hover:shadow-md ${
                        activeCoverage === cov.id ? 'border-blue-500 ring-4 ring-blue-50' : 'border-gray-100 hover:border-blue-300'
                        }`}
                    >
                        <div className="flex items-start gap-4">
                        <div className="bg-gray-50 p-3 rounded-lg flex-shrink-0">
                            {cov.icon}
                        </div>
                        <div>
                            <h3 className="font-bold text-lg text-gray-800">{cov.title}</h3>
                            <p className="text-sm text-gray-600 mt-1">{cov.description}</p>
                        </div>
                        </div>
                        
                        <div className={`mt-4 pt-4 border-t border-gray-100 overflow-hidden transition-all duration-300 ${activeCoverage === cov.id ? 'max-h-40 opacity-100' : 'max-h-0 opacity-0 pt-0 border-t-0'}`}>
                        <p className="text-sm font-medium text-blue-700 bg-blue-50 p-3 rounded-lg">
                            {cov.details}
                        </p>
                        </div>
                    </div>
                    ))}
                </div>
                </section>

                {/* The Magic of IDD (Deductibles) */}
                <section className="bg-gradient-to-br from-gray-900 to-blue-900 rounded-2xl p-6 md:p-8 shadow-lg text-white">
                <div className="flex flex-col md:flex-row gap-8 items-center">
                    <div className="flex-1">
                    <div className="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-yellow-400/20 text-yellow-300 text-sm font-bold mb-4">
                        <AlertTriangle className="w-4 h-4" /> La joya de la corona
                    </div>
                    <h2 className="text-2xl md:text-3xl font-bold mb-4">Entendiendo el Deducible y la Cobertura IDD</h2>
                    <p className="text-blue-100 mb-4 text-sm md:text-base leading-relaxed">
                        Normalmente, en cualquier choque, debes pagar un "deducible" (ej. ₡400,000) de tu bolsillo antes de que el seguro pague el resto. <strong>¡Pero nosotros incluimos la cobertura IDD e IGN!</strong>
                    </p>
                    <ul className="space-y-3">
                        <li className="flex items-start gap-3">
                        <CheckCircle className="text-green-400 w-5 h-5 flex-shrink-0 mt-0.5" />
                        <span className="text-sm md:text-base"><strong>IDD:</strong> Te reintegramos el 100% de ese deducible hasta en dos accidentes al año.</span>
                        </li>
                        <li className="flex items-start gap-3">
                        <CheckCircle className="text-green-400 w-5 h-5 flex-shrink-0 mt-0.5" />
                        <span className="text-sm md:text-base"><strong>N en C (Exención de deducible para daños a terceros):</strong> Con esta cobertura se cubren al 100% los daños del tercero que sean mayores a ₡750,000. Si el daño es menor a ₡750,000, solo pagas ₡150,000 de deducible al tercero y el seguro cubre el resto.</span>
                        </li>
                    </ul>
                    <p className="mt-6 text-yellow-400 font-semibold italic text-sm">
                        En resumen: Chocas, reparas tu carro, ¡y no sacas plata de tu bolsillo para el deducible!
                    </p>
                    </div>
                    
                    <div className="w-full md:w-1/3 bg-white/10 p-6 rounded-xl backdrop-blur-sm border border-white/20 text-center">
                    <p className="text-sm text-blue-200 mb-2">En caso de accidente:</p>
                    <div className="text-4xl font-black text-white mb-1">₡0</div>
                    <p className="text-xs font-medium text-yellow-400 uppercase tracking-wide">A pagar por deducible*</p>
                    <p className="text-[10px] text-blue-300 mt-4 leading-tight">*Gracias a la cobertura IDD de tu vehículo. Para daños a terceros aplica cobertura N en C.</p>
                    </div>
                </div>
                </section>

                {/* Desplegable de Cobertura M */}
                <section className="mt-8 bg-white border border-gray-200 rounded-2xl shadow-sm overflow-hidden transition-all duration-300">
                <button 
                    onClick={() => setShowAsistencia(!showAsistencia)} 
                    className="w-full flex justify-between items-center p-5 md:p-6 bg-gray-50 hover:bg-gray-100 transition-colors"
                >
                    <div className="flex items-center gap-4 text-left">
                    <div className="bg-orange-100 p-3 rounded-xl flex-shrink-0">
                        <Wrench className="w-6 h-6 text-orange-600" />
                    </div>
                    <div>
                        <h3 className="text-lg md:text-xl font-bold text-gray-800">Detalle de Beneficios de Asistencia (Cobertura M)</h3>
                        <p className="text-sm text-gray-500 font-normal">Conoce los límites de grúa, cerrajería, paso de corriente y más.</p>
                    </div>
                    </div>
                    {showAsistencia ? <ChevronUp className="w-6 h-6 text-gray-400 flex-shrink-0"/> : <ChevronDown className="w-6 h-6 text-gray-400 flex-shrink-0"/>}
                </button>
                
                {showAsistencia && (
                    <div className="p-5 md:p-6 border-t border-gray-200 bg-white">
                    <div className="flex bg-gray-100 rounded-lg p-1 mb-6 max-w-md mx-auto">
                        <button 
                        onClick={() => setAsistenciaTab('plus')}
                        className={`flex-1 py-2 text-sm font-bold rounded-md transition-colors ${asistenciaTab === 'plus' ? 'bg-white shadow-sm text-blue-700' : 'text-gray-500 hover:text-gray-700'}`}
                        >
                        Plan Plus Extendido (0-6 años)
                        </button>
                        <button 
                        onClick={() => setAsistenciaTab('basico')}
                        className={`flex-1 py-2 text-sm font-bold rounded-md transition-colors ${asistenciaTab === 'basico' ? 'bg-white shadow-sm text-blue-700' : 'text-gray-500 hover:text-gray-700'}`}
                        >
                        Plan Básico (7-15 años)
                        </button>
                    </div>

                    <div className="overflow-x-auto">
                        <table className="w-full text-left text-sm border-collapse">
                        <thead>
                            <tr className="bg-blue-900 text-white">
                            <th className="p-3 rounded-tl-lg font-semibold">Servicio de Asistencia</th>
                            <th className="p-3 font-semibold">Límite de Eventos</th>
                            <th className="p-3 rounded-tr-lg font-semibold">Monto Máximo</th>
                            </tr>
                        </thead>
                        <tbody>
                            {(asistenciaTab === 'plus' ? asistenciasPlus : asistenciasBasico).map((item, index) => (
                            <tr key={index} className={`border-b border-gray-100 hover:bg-blue-50 ${item.destacado ? 'bg-yellow-50' : ''}`}>
                                <td className="p-3 font-medium text-gray-800 flex items-center gap-2">
                                {item.destacado && <span className="inline-block px-2 py-0.5 bg-yellow-400 text-yellow-900 text-[10px] font-bold rounded uppercase tracking-wide">Plus</span>}
                                {item.serv}
                                </td>
                                <td className={`p-3 text-gray-600 ${item.destacado ? 'font-medium text-yellow-800' : ''}`}>{item.limite}</td>
                                <td className={`p-3 text-gray-600 ${item.destacado ? 'font-medium text-yellow-800' : ''}`}>{item.monto}</td>
                            </tr>
                            ))}
                        </tbody>
                        </table>
                    </div>
                    <p className="text-xs text-gray-400 mt-4 text-center italic">Ambos planes incluyen orientación médica telefónica, referencias de talleres e información sin límite de eventos.</p>
                    </div>
                )}
                </section>

                {/* How to proceed */}
                <section className="text-center py-12 flex flex-col items-center">
                <a 
                    href="https://forms.gle/NJB5s3zRQ7Hdv1xe7" 
                    target="_blank" 
                    rel="noopener noreferrer"
                    className="bg-[#469145] hover:bg-green-700 text-white text-xl font-bold py-4 px-10 rounded-2xl shadow-md transition-all transform hover:-translate-y-1 mb-6 inline-block"
                >
                    ¡Agendar mi cita ahora!
                </a>
                
                <p className="text-lg text-gray-800 mb-10 max-w-2xl">
                    Esta cotización estará disponible por los <strong>próximos 15 días</strong>. ¡No deje pasar esta oportunidad de proteger su vehículo!
                </p>

                <h3 className="text-2xl font-bold text-[#469145] mb-4">
                    Es fácil, es rápido, es seguro.
                </h3>

                <div className="flex flex-col md:flex-row items-center justify-center gap-3 text-gray-600 font-medium md:text-lg">
                    <div className="flex gap-1">
                    {[1, 2, 3, 4, 5].map(i => <Star key={i} className="w-6 h-6 text-yellow-400" />)}
                    </div>
                    <span className="italic">Miles de conductores ya están protegidos con nuestro proceso digital</span>
                </div>
                </section>
            </main>

            {/* Footer */}
            <footer className="bg-gray-900 text-gray-300 py-10 text-center mt-6 border-t-4 border-blue-900">
                <div className="max-w-4xl mx-auto px-4 space-y-4 text-sm">
                <p className="font-bold text-white text-base">
                    Esta aplicación pertenece a Seguros Digitales SDI®.
                </p>
                <p>
                    Visítenos en{' '}
                    <a href="https://www.segurosdelins.com" target="_blank" rel="noreferrer" className="text-blue-400 font-semibold hover:text-blue-300 hover:underline transition-colors">
                    www.segurosdelins.com
                    </a>
                </p>
                <div className="border-t border-gray-800 pt-6 mt-4">
                    <p className="text-xs text-gray-400 max-w-3xl mx-auto leading-relaxed">
                    © 2026 Propiedad Intelectual de Juan Carlos Hernández Vargas. Todos los derechos reservados. Esta plataforma es una herramienta de uso exclusivo para los clientes vinculados a la Licencia Sugese 08-1318. Queda prohibida su reproducción o uso por terceros sin autorización expresa del titular.
                    </p>
                </div>
                </div>
            </footer>
            </div>
        );
        }

        // Renderizar la app en el div con id "root"
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ExplicadorSeguro />);
    </script>
</body>
</html>
